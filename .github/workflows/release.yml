name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: wled-sim-linux-amd64
            deps: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            binary: wled-sim-linux-arm64
            cc: aarch64-linux-gnu-gcc
            deps: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu libgl1-mesa-dev xorg-dev
          - os: macos-latest
            goos: darwin
            goarch: amd64
            binary: wled-sim-darwin-amd64
            deps: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: wled-sim-darwin-arm64
            deps: ""
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            binary: wled-sim-windows-amd64.exe
            cc: x86_64-w64-mingw32-gcc
            deps: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Install dependencies
        if: matrix.deps != ''
        run: ${{ matrix.deps }}
      - name: Test
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go test -v -race ./...
      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc || '' }}
        run: go build -ldflags="-s -w" -o build/${{ matrix.binary }} ./cmd
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: build/${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f | while read f; do
            cp "$f" release/
          done
          ls -la release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
