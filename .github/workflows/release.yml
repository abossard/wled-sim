name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0). Must already exist."
        required: true

permissions:
  contents: write

env:
  GO_VERSION: "1.21"
  BINARY: wled-sim
  # Coordinated with runtime agent: ldflags target main.version/commit/date.
  LDFLAGS_PKG: main

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
            deps: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev
          - target: linux-arm64
            os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
            deps: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev
          - target: darwin-amd64
            os: macos-13
            goos: darwin
            goarch: amd64
            ext: ""
            archive: zip
          - target: darwin-arm64
            os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            archive: zip
          - target: windows-amd64
            os: ubuntu-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip
            cc: x86_64-w64-mingw32-gcc
            deps: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install build dependencies
        if: matrix.deps != ''
        shell: bash
        run: ${{ matrix.deps }}

      - name: Resolve version metadata
        id: meta
        shell: bash
        run: |
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          version="${ref#refs/tags/}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          set -euo pipefail
          mkdir -p dist
          out="dist/${{ env.BINARY }}${{ matrix.ext }}"
          ldflags="-s -w \
            -X ${LDFLAGS_PKG}.version=${{ steps.meta.outputs.version }} \
            -X ${LDFLAGS_PKG}.commit=${{ steps.meta.outputs.commit }} \
            -X ${LDFLAGS_PKG}.date=${{ steps.meta.outputs.date }}"
          go build -trimpath -ldflags "${ldflags}" -o "${out}" ./cmd

      - name: Stage archive contents
        shell: bash
        run: |
          set -euo pipefail
          stage="stage/${{ env.BINARY }}-${{ steps.meta.outputs.version }}-${{ matrix.target }}"
          mkdir -p "${stage}"
          cp "dist/${{ env.BINARY }}${{ matrix.ext }}" "${stage}/"
          cp README.md LICENSE config.example.yaml "${stage}/"
          ls -la "${stage}"

      - name: Create tar.gz archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          name="${{ env.BINARY }}-${{ steps.meta.outputs.version }}-${{ matrix.target }}"
          mkdir -p artifacts
          tar -C stage -czf "artifacts/${name}.tar.gz" "${name}"
          ( cd artifacts && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )

      - name: Create zip archive
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          set -euo pipefail
          name="${{ env.BINARY }}-${{ steps.meta.outputs.version }}-${{ matrix.target }}"
          mkdir -p artifacts
          ( cd stage && zip -r "../artifacts/${name}.zip" "${name}" )
          ( cd artifacts && shasum -a 256 "${name}.zip" > "${name}.zip.sha256" )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Aggregate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          ls -la
          # Combine per-archive .sha256 files into a single SHA256SUMS file.
          : > SHA256SUMS
          for f in *.sha256; do
            cat "$f" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${ref#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            Desktop UI build of the WLED Simulator. Download the archive for your platform below.

            **Verify downloads** with `SHA256SUMS` (or the per-file `.sha256`).

            First-run notes:
            - macOS: binaries are unsigned; on first launch right-click → Open, or remove the quarantine attribute with `xattr -d com.apple.quarantine wled-sim`.
            - Windows: SmartScreen may warn on first run; choose "More info" → "Run anyway".
            - Linux: requires an X11/Wayland session and OpenGL libraries (`libgl1`, `libx11`, `libxcursor`, `libxrandr`, `libxinerama`, `libxi`).
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256
            artifacts/SHA256SUMS
